<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Ozod Trader Pro</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, child } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAkZf1nLWojE7wgP00IRU8_2Tqw2RAyB_k",
            authDomain: "trade-78a40.firebaseapp.com",
            databaseURL: "https://trade-78a40-default-rtdb.firebaseio.com",
            projectId: "trade-78a40",
            storageBucket: "trade-78a40.firebasestorage.app",
            messagingSenderId: "178344205557",
            appId: "1:178344205557:web:e888adc3765386e0efb9bc"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.ref = ref; window.set = set; window.get = get; window.update = update; window.child = child;
    </script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #121212; padding: 25px; border-radius: 20px; width: 320px; border: 1px solid #333; }
        h3 { text-align: center; color: #d4af37; cursor: pointer; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-calc { background: #d4af37; color: black; }
        .btn-buy { background: #28a745; color: white; }
        .btn-sell { background: #dc3545; color: white; }
        .btn-sec { background: #333; color: white; }
        .hidden { display: none; }
        table { width: 100%; color: white; font-size: 12px; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 5px; text-align: center; }
        #output { margin-top: 15px; color: #d4af37; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-screen" class="card">
    <h3 onclick="adminLogin()">OZOD TRADER</h3>
    <input type="text" id="login-user" placeholder="Username">
    <input type="password" id="login-pass" placeholder="Password">
    <button onclick="login()" class="btn-calc">KIRISH</button>
    <button class="btn-sec" onclick="showPage('reg-screen')">RO'YXATDAN O'TISH</button>
</div>

<div id="reg-screen" class="card hidden">
    <h3>RO'YXATDAN O'TISH</h3>
    <input type="text" id="reg-user" placeholder="Username">
    <input type="password" id="reg-pass" placeholder="Password">
    <button onclick="register()" class="btn-calc">SAQLASH</button>
    <button class="btn-sec" onclick="showPage('auth-screen')">ORQAGA</button>
</div>

<div id="calc-screen" class="card hidden">
    <h3>OZOD TRADE PRO</h3>
    <input type="number" id="h" placeholder="HIGH">
    <input type="number" id="l" placeholder="LOW">
    <div id="output"></div>
    <div class="btn-group">
        <button class="btn-buy" onclick="sniperCalc('buy')">BUY</button>
        <button class="btn-sell" onclick="sniperCalc('sell')">SELL</button>
    </div>
    <button class="btn-sec" onclick="location.reload()">CHIQISH</button>
</div>

<div id="admin-screen" class="card hidden">
    <h3>ADMIN PANEL</h3>
    <table id="user-table"><tr><th>User</th><th>Prem</th><th>Amal</th></tr></table>
    <button class="btn-sec" onclick="location.reload()">CHIQISH</button>
</div>

<script>
    function showPage(id) {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    async function register() {
        const u = document.getElementById('reg-user').value.trim();
        const p = document.getElementById('reg-pass').value.trim();
        if(!u || !p) return alert("To'ldiring!");
        await set(ref(db, 'users/' + u), { pass: p, premium: false });
        alert("Saqlandi!");
        location.reload();
    }

    async function login() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        const snap = await get(child(ref(db), 'users/' + u));
        if(snap.exists() && snap.val().pass === p) {
            showPage('calc-screen');
        } else alert("Username yoki parol xato!");
    }

    // Sniper uslubidagi hisoblash funksiyasi
    function sniperCalc(type) {
        const h = parseFloat(document.getElementById('h').value);
        const l = parseFloat(document.getElementById('l').value);
        if (isNaN(h) || isNaN(l)) return alert("High va Low ni kiriting!");

        const range = h - l;
        let razvorot, korrektsiya, konsolidatsiya;

        if (type === 'buy') {
            razvorot = l + (range * 0.236);
            korrektsiya = l + (range * 0.5);
            konsolidatsiya = l + (range * 0.764);
        } else {
            razvorot = h - (range * 0.236);
            korrektsiya = h - (range * 0.5);
            konsolidatsiya = h - (range * 0.764);
        }

        document.getElementById('output').innerHTML = `
            Razvorot: ${razvorot.toFixed(2)}<br>
            Korrektsiya: ${korrektsiya.toFixed(2)}<br>
            Konsolidatsiya: ${konsolidatsiya.toFixed(2)}
        `;
    }

    function adminLogin() {
        if(prompt("Admin kod:") === "20111011") {
            showPage('admin-screen');
            loadAdmin();
        }
    }

    async function loadAdmin() {
        const snap = await get(ref(db, 'users'));
        let t = document.getElementById('user-table');
        t.innerHTML = `<tr><th>User</th><th>Prem</th><th>Amal</th></tr>`;
        snap.forEach(c => {
            t.innerHTML += `<tr><td>${c.key}</td><td>${c.val().premium ? '✅' : '❌'}</td>
            <td><button onclick="togglePrem('${c.key}', ${!c.val().premium})">O'z</button></td></tr>`;
        });
    }

    async function togglePrem(u, val) {
        await update(ref(db, 'users/' + u), { premium: val });
        loadAdmin();
    }
</script>
</body>
</html>
