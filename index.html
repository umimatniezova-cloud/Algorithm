<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC & MSNR AI Analizator</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --accent-color: #58a6ff;
            --text-color: #c9d1d9;
            --border-color: #30363d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
            margin-bottom: 20px;
        }

        .upload-zone:hover {
            border-color: var(--accent-color);
        }

        #fileInput {
            display: none;
        }

        .preview-container {
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        #imagePreview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1f6feb;
        }

        button:disabled {
            background-color: #21262d;
            color: #8b949e;
            cursor: not-allowed;
        }

        .result-panel {
            margin-top: 24px;
            padding: 16px;
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            min-height: 100px;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .status {
            font-style: italic;
            color: #8b949e;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SMC & MSNR Market Analizator</h1>
    
    <!-- Rasm yuklash maydoni -->
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <p>Grafik skrinshotini yuklash uchun bu yerga bosing</p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <!-- Yuklangan rasmni ko'rish -->
    <div class="preview-container" id="previewContainer">
        <img id="imagePreview" src="" alt="Grafik Preview">
    </div>

    <!-- Tahlil tugmasi -->
    <button id="analyzeBtn" disabled>Grafikni Tahlil Qilish</button>

    <!-- Natijani chiqarish paneli -->
    <div class="result-panel" id="resultPanel">
        <p class="status">Grafik yuklanishi kutilmoqda...</p>
    </div>
</div>

<script>
    // Google AI Studio'dan olingan yangi va aktiv API kaliting
    const GEMINI_API_KEY = "AQ.Ab8RN6Lw94FvXypNbYzqVYejFP701P8XlASIZ55iGW8rTinYIQ";
    
    const fileInput = document.getElementById('fileInput');
    const previewContainer = document.getElementById('previewContainer');
    const imagePreview = document.getElementById('imagePreview');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultPanel = document.getElementById('resultPanel');

    let base64ImageData = "";

    // Rasm tanlanganda uni o'qish va preview qilish
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            imagePreview.src = event.target.result;
            previewContainer.style.display = 'block';
            
            // Base64 formatidagi toza ma'lumotni ajratib olish
            base64ImageData = event.target.result.split(',')[1];
            
            analyzeBtn.disabled = false;
            resultPanel.innerHTML = '<p class="status">Grafik tayyor. Tahlil tugmasini bosing.</p>';
        };
        reader.readAsDataURL(file);
    });

    // Tahlil tugmasi bosilganda Gemini API'ga so'rov yuborish
    analyzeBtn.addEventListener('click', async function() {
        if (!base64ImageData) return;

        analyzeBtn.disabled = true;
        resultPanel.innerHTML = '<p class="status">Grafik tahlil qilinmoqda, iltimos kuting...</p>';

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

        // Smart Money Concepts va MSNR bo'yicha maxsus qoidalar to'plami
        const systemInstruction = `
            Siz moliya bozorlari bo'yicha professional texnik tahlilchisiz. 
            Sizga taqdim etilgan grafik skrinshotini Smart Money Concepts (SMC) va MSNR (Market Structure) strategiyalari asosida mukammal tahlil qilib bering.
            
            Tahlil davomida quyidagi elementlarni aniqlang va tushuntiring:
            1. Market Structure: Bozordagi joriy struktura va trend (BOS, CHoCH, MSNR o'zgarishlari).
            2. Likvidlik (Liquidity): Olingan yoki maqsad qilinayotgan likvidlik zonalari (BSL, SSL, Liquidity Sweeps).
            3. Qiziqish zonalari (POI): Kuchli Order Block (OB), Fair Value Gap (FVG) yoki Optimal Trade Entry (OTE) nuqtalari.
            4. Kelgusi ehtimoliy harakat yo'nalishi bo'yicha xulosa.
            
            Javobingizni tushunarli, aniq va lo'nda qilib o'zbek tilida bayon eting.
        `;

        const requestBody = {
            contents: [
                {
                    parts: [
                        { text: systemInstruction },
                        {
                            inlineData: {
                                mimeType: "image/jpeg",
                                data: base64ImageData
                            }
                        }
                    ]
                }
            ]
        };

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || "API so'rovida xatolik yuz berdi");
            }

            const data = await response.json();
            const analysisResult = data.candidates[0].content.parts[0].text;
            
            // Natijani formatlab ekranga chiqarish
            resultPanel.innerHTML = analysisResult;

        } catch (error) {
            resultPanel.innerHTML = `<p style="color: #ff7b72;">Xatolik yuz berdi: ${error.message}</p>`;
        } finally {
            analyzeBtn.disabled = false;
        }
    });
</script>

</body>
</html>
